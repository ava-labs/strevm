name: Go

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  # If adding a new job, add it to the `needs` list of the `go` job as this is
  # what gates PRs.
  go:
    runs-on: ubuntu-latest
    needs: [go_build_prod, go_test, go_test_race, go_generate, go_tidy, require_fuzz_corpus, go_fuzz]
    steps:
      - run: echo "Dependencies successful"

  go_build_prod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
      - run: | # Ensures no leakage of test-only helpers into production code
          go build -tags prod,nocmpopts -o /dev/null ./...

  go_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
      - run: go test ./...

  go_test_race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
      - run: go test ./... -race

  go_fuzz:
    needs: [find_fuzz_targets]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: ${{fromJSON(needs.find_fuzz_targets.outputs.targets)}}
    steps:
      - name: Parse fuzz target
        env:
          TARGET: ${{ matrix.target }}
        run: |
          echo "$TARGET" | awk -F: '{print $1}' | xargs dirname | xargs -I{} echo "PACKAGE={}" >> "$GITHUB_ENV"
          echo "$TARGET" | awk -F: '{print $2}' | xargs -I{} echo "FUNCTION={}" >> "$GITHUB_ENV"
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
      - name: Get Go cache directory
        run: echo "GOCACHE=$(go env GOCACHE)" >> "$GITHUB_ENV"
      - name: Restore fuzz corpus cache
        uses: actions/cache@v4
        with:
          path: ${{ env.GOCACHE }}/fuzz
          key: fuzz-corpus-${{ runner.os }}-${{ env.FUNCTION }}-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-${{env.PACKAGE}}-${{ env.FUNCTION }}
      - run: go test ./${PACKAGE} -fuzz=${FUNCTION} -fuzztime=30s

  go_generate:
    env:
      EXCLUDE_REGEX: "ava-labs/libevm/(accounts/usbwallet/trezor)$"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Run `go generate`
        run: go list ./... | grep -Pv "${EXCLUDE_REGEX}" | xargs go generate;

      - name: git diff
        run: git diff --exit-code

  go_tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
      - run: go mod tidy
      - run: git diff --exit-code

  find_fuzz_targets:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.find.outputs.targets }}
    steps:
      - uses: actions/checkout@v4
      - id: find
        run: |
          echo "targets=$(grep --recursive --include '**_test.go' -oP "^func \KFuzz[^(]+" | xargs jq -c -n '$ARGS.positional' --args)" >> $GITHUB_OUTPUT

  require_fuzz_corpus:
    needs: [find_fuzz_targets]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: ${{fromJSON(needs.find_fuzz_targets.outputs.targets)}}
    env:
      # The actual corpus size is dependent on the test in question and how many
      # "interesting" cases can be found. This is an arbitrary lower bound,
      # chosen as approximately half the size of the very basic
      # `FuzzEffectiveGasTip`.
      MIN_CORPUS_SIZE: 20
    steps:
      - name: Parse fuzz target
        env:
          TARGET: ${{ matrix.target }}
        run: |
          echo "$TARGET" | awk -F: '{print $1}' | xargs dirname | xargs -I{} echo "PACKAGE={}" >> "$GITHUB_ENV"
          echo "$TARGET" | awk -F: '{print $2}' | xargs -I{} echo "FUNCTION={}" >> "$GITHUB_ENV"
      - run: |
          echo "CORPUS_DIR=./${PACKAGE}/testdata/fuzz/${FUNCTION}" >> "$GITHUB_ENV"
      - uses: actions/checkout@v4
      - name: Require existing corpus of at least ${MIN_CORPUS_SIZE}
        run: | # Raw `go test` will be meaningful, and `-fuzz` won't start from nowhere
          [ -d "${CORPUS_DIR}" ] && [ $(ls "${CORPUS_DIR}" | wc -l) -gt ${MIN_CORPUS_SIZE} ]
